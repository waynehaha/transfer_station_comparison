<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中转站输出价格对比</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Crect width=%2764%27 height=%2764%27 rx=%2716%27 fill=%27%23f97316%27/%3E%3Cpath d=%27M16 42h32M18 32h28M22 22h20%27 stroke=%27white%27 stroke-width=%276%27 stroke-linecap=%27round%27/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero" aria-labelledby="page-title">
      <div class="hero-copy">
        <p class="eyebrow">AI 模型中转站价格计算器</p>
        <h1 id="page-title">中转站输出性价比排行</h1>
        <p class="subhead">看每充 10 元能换多少输出，也能反算 100万、1000万、1亿输出分别要花多少钱。</p>
      </div>
    </section>

    <section class="panel editor-panel" aria-labelledby="editor-title">
      <div class="section-title-row">
        <div>
          <p class="eyebrow">Manage</p>
          <h2 id="editor-title">新增渠道</h2>
        </div>
        <button id="restoreDefaultsBtn" type="button" class="ghost-btn">恢复默认示例</button>
      </div>
      <form id="providerForm" class="provider-form">
        <label>
          <span>渠道名称</span>
          <input id="providerName" name="providerName" type="text" placeholder="例如：某某 Pro" required />
        </label>
        <label>
          <span>跳转链接</span>
          <input id="providerLink" name="providerLink" type="text" placeholder="例如：https://example.com" />
        </label>
        <label>
          <span>计价方式</span>
          <select id="providerPricingMode" name="providerPricingMode" class="form-select">
            <option value="usd" selected>美元额度</option>
            <option value="cny">人民币直扣</option>
          </select>
        </label>
        <label>
          <span>充值金额（人民币）</span>
          <input id="providerCny" name="providerCny" type="number" min="0.01" step="0.01" placeholder="例如：100" required />
        </label>
        <label>
          <span id="providerCreditLabel">到账美元额度</span>
          <input id="providerUsd" name="providerUsd" type="number" min="0.01" step="0.01" placeholder="例如：100" required />
        </label>
        <div class="price-pair">
          <label class="actual-price-field">
            <span id="providerActualInputLabel">实际输入价（美元/M）</span>
            <input id="providerActualInput" name="providerActualInput" type="number" min="0" step="0.0001" placeholder="可选：1.4" />
          </label>
          <label>
            <span id="providerInputPriceLabel">官方输入价（美元/M）</span>
            <input id="providerOfficialInput" name="providerOfficialInput" type="number" min="0" step="0.0001" placeholder="默认：5" required />
          </label>
        </div>
        <div class="price-pair">
          <label class="actual-price-field">
            <span id="providerActualOutputLabel">实际输出价（美元/M）</span>
            <input id="providerActualOutput" name="providerActualOutput" type="number" min="0.0001" step="0.0001" placeholder="可选：8.4" />
          </label>
          <label>
            <span id="providerOutputPriceLabel">官方输出价（美元/M）</span>
            <input id="providerOfficialOutput" name="providerOfficialOutput" type="number" min="0.0001" step="0.0001" placeholder="默认：30" required />
          </label>
        </div>
        <div class="price-pair">
          <label class="actual-price-field">
            <span id="providerActualCacheLabel">实际缓存价（美元/M）</span>
            <input id="providerActualCache" name="providerActualCache" type="number" min="0" step="0.0001" placeholder="可选：0.14" />
          </label>
          <label>
            <span id="providerCachePriceLabel">官方缓存价（美元/M）</span>
            <input id="providerOfficialCache" name="providerOfficialCache" type="number" min="0" step="0.0001" placeholder="默认：0.5" required />
          </label>
        </div>
        <label id="providerMultiplierLabel">
          <span>渠道倍率</span>
          <input id="providerMultiplier" name="providerMultiplier" type="number" min="0" step="0.0001" placeholder="例如：0.3" required />
        </label>
        <button type="submit" class="primary-btn">添加到对比</button>
      </form>
      <input id="importDataInput" type="file" accept="application/json,.json" hidden />
      <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>
    </section>

    <section class="panel" aria-labelledby="table-title">
      <div class="section-title-row details-title-row">
        <div>
          <p class="eyebrow">Details</p>
          <h2 id="table-title">中转站对比表</h2>
        </div>
        <div class="table-action-group">
          <div class="display-mode-control">
            <span class="display-mode-label">价格显示</span>
            <div class="display-switch" role="group" aria-label="价格显示方式">
              <button type="button" class="display-mode-btn is-active" data-display-mode="original" aria-pressed="true">原始价格</button>
              <button type="button" class="display-mode-btn" data-display-mode="cny" aria-pressed="false">统一人民币</button>
              <button type="button" class="display-mode-btn" data-display-mode="usd" aria-pressed="false">统一美元</button>
            </div>
          </div>
          <div class="inline-data-actions" aria-label="数据导入导出">
            <button id="exportDataBtn" type="button" class="ghost-btn">导出数据</button>
            <button id="importDataBtn" type="button" class="ghost-btn">导入数据</button>
          </div>
          <span id="officialVisibilityHint" class="hint-icon" role="img" tabindex="0" aria-label="默认显示各渠道自己的报价。需要横向比较时，可切到统一人民币或统一美元；需要查看官方基础价格时，可点击“显示官方价”。" data-tooltip="默认显示各渠道自己的报价。需要横向比较时，可切到统一人民币或统一美元；需要查看官方基础价格时，可点击“显示官方价”。">?</span>
          <button id="officialToggleBtn" type="button" class="ghost-btn" aria-pressed="false">显示官方价</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="priceHeadRow"></tr>
          </thead>
          <tbody id="priceRows"></tbody>
        </table>
      </div>
    </section>

    <section class="formula panel" aria-labelledby="formula-title">
      <p class="eyebrow">Formula</p>
      <h2 id="formula-title">怎么算的</h2>
      <p>默认展示每个渠道自己的原始报价。切到统一人民币或统一美元后，表格会把不同计价方式换成同一种货币，方便横向比较。</p>
      <p class="formula-box">目标输出价格 = 目标输出量 × 统一人民币输出价；统一美元按 ¥6.8 ≈ $1 估算</p>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
